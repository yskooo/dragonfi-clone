<nav class="navbar">
  <div class="nav-inner">

    <div class="nav-brand">
      <img src="https://dragonfi-dev-public-assets.s3.ap-southeast-1.amazonaws.com/logo/dragonfi-logo-white.png" alt="DragonFi" height="24">
    </div>

    <ul class="nav-links">
      <li><a routerLink="/dashboard" routerLinkActive="active">Dashboard</a></li>
      <li><a routerLink="/orders" routerLinkActive="active">Trade</a></li>
      <li><a routerLink="/transactions" routerLinkActive="active">Transactions</a></li>
      <li><a routerLink="/portfolio" routerLinkActive="active">My Money ▾</a></li>
      <li><a routerLink="/market" routerLinkActive="active">Market ▾</a></li>
      <li><a routerLink="/research" routerLinkActive="active">Research</a></li>
      <li class="nav-logo-link">
        <a href="#">
          <img src="https://dragonfi-dev-public-assets.s3.ap-southeast-1.amazonaws.com/Investing+Club/logo-white.svg" alt="Investing Club" height="20">
        </a>
      </li>
      <li class="nav-logo-link">
        <a href="#">
          <img src="https://dragonfi-dev-public-assets.s3.ap-southeast-1.amazonaws.com/Static/Media/ic-logo-white.svg" alt="Investor's Corner" height="20">
        </a>
      </li>
    </ul>

    <div class="nav-right">
      <div class="nav-chip">
        <span class="chip-dot" [class.open]="marketOpen"></span>
        {{ marketOpen ? 'Market Open' : 'Market Closed' }}
      </div>
      <div class="nav-time mono">{{ currentTime | date:'HH:mm:ss' }}</div>
      <button class="icon-btn" title="Search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="user-avatar-btn">JD</div>
    </div>

    <button class="mobile-menu-btn" (click)="mobileMenuOpen = !mobileMenuOpen">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  @if (mobileMenuOpen) {
    <div class="mobile-nav">
      <a routerLink="/dashboard" routerLinkActive="active" (click)="mobileMenuOpen = false">Dashboard</a>
      <a routerLink="/market" routerLinkActive="active" (click)="mobileMenuOpen = false">Market</a>
      <a routerLink="/portfolio" routerLinkActive="active" (click)="mobileMenuOpen = false">Portfolio</a>
      <a routerLink="/transactions" routerLinkActive="active" (click)="mobileMenuOpen = false">My Transactions</a>
      <a routerLink="/orders" routerLinkActive="active" (click)="mobileMenuOpen = false">Orders</a>
    </div>
  }
</nav>
